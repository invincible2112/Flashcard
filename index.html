<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deutsch Pro v2</title>
<style>
body{font-family:system-ui;background:#0f172a;color:#fff;margin:0}
.container{max-width:420px;margin:auto;padding:20px}
.card{background:#1e293b;padding:30px;border-radius:20px;text-align:center}
.top{display:flex;justify-content:space-between;margin-bottom:10px}
button,select,input{padding:10px;border-radius:10px;border:none;margin:5px}
.progress{height:8px;background:#334155;border-radius:10px;overflow:hidden;margin:10px 0}
.bar{height:100%;background:#22c55e;width:0%}
</style>
</head>
<body>

<div class="container">

<div class="top">
<select id="level"></select>
<select id="mode">
<option value="exam">🎓</option>
<option value="talk">💬</option>
</select>
</div>

<div class="progress"><div class="bar" id="bar"></div></div>

<div class="card">
<h2 id="word"></h2>
<p id="meaning" style="display:none"></p>
<p id="example" style="display:none;color:#94a3b8"></p>
</div>

<div style="text-align:center">
<button onclick="flip()">👁️</button>
<button onclick="speak()">🔊</button>
</div>

<div style="text-align:center">
<input id="input" placeholder="Type..." />
<button onclick="check()">OK</button>
</div>

<div style="text-align:center">
<button onclick="answer(true)">✔</button>
<button onclick="answer(false)">✘</button>
</div>

</div>

<script>

const DATA = {
A1:{
exam:[
{w:"Haus",m:"nhà",ex:"Das Haus ist groß."},
{w:"gehen",m:"đi",ex:"Ich gehe nach Hause."},
{w:"essen",m:"ăn",ex:"Ich esse Brot."},
{w:"trinken",m:"uống",ex:"Ich trinke Wasser."}
],
talk:[
{w:"Hallo",m:"xin chào",ex:"Hallo! Wie geht's?"},
{w:"Danke",m:"cảm ơn",ex:"Danke für deine Hilfe!"},
{w:"Tschüss",m:"tạm biệt",ex:"Tschüss! Bis später."}
]
},
A2:{
exam:[
{w:"lernen",m:"học",ex:"Ich lerne Deutsch."},
{w:"arbeiten",m:"làm việc",ex:"Ich arbeite viel."},
{w:"reisen",m:"du lịch",ex:"Ich reise gern."}
],
talk:[
{w:"Was machst du?",m:"Bạn làm gì?",ex:"Was machst du heute?"},
{w:"Keine Ahnung",m:"không biết",ex:"Ich habe keine Ahnung."}
]
}
};

let level = localStorage.level || "A1";
let mode = localStorage.mode || "exam";

let progress = JSON.parse(localStorage.getItem("progress") || "{}");

function key(){
  return level + "_" + mode;
}

function getState(){
  if(!progress[key()]) progress[key()] = {i:0,correct:0};
  return progress[key()];
}

function renderLevels(){
  let sel=document.getElementById("level");
  ["A1","A2"].forEach(l=>{
    let opt=document.createElement("option");
    opt.value=l;
    opt.text=l;
    if(l===level) opt.selected=true;
    sel.appendChild(opt);
  });
}

function render(){
  let state=getState();
  let list=DATA[level][mode];
  let c=list[state.i];

  word.innerText=c.w;
  meaning.innerText=c.m;
  example.innerText=c.ex;

  bar.style.width=(state.correct/list.length)*100+"%";

  localStorage.setItem("progress",JSON.stringify(progress));
}

function flip(){
  meaning.style.display="block";
  example.style.display="block";
}

function speak(){
  let u=new SpeechSynthesisUtterance(word.innerText);
  u.lang="de-DE";
  speechSynthesis.speak(u);
}

function check(){
  let val=input.value.toLowerCase();
  if(val===word.innerText.toLowerCase()){
    alert("✅");
  }else{
    alert("❌ "+word.innerText);
  }
}

function answer(ok){
  let state=getState();
  if(ok) state.correct++;
  state.i = (state.i+1) % DATA[level][mode].length;
  render();
}

document.getElementById("level").onchange = e=>{
  level=e.target.value;
  localStorage.level=level;
  location.reload();
}

document.getElementById("mode").onchange = e=>{
  mode=e.target.value;
  localStorage.mode=mode;
  location.reload();
}

renderLevels();
render();

</script>

</body>
</html>
