<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deutsch Minimal Pro</title>
<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:#0b1220;
  color:#e5e7eb;
}

.container{
  max-width:420px;
  margin:auto;
  padding:20px;
}

.header{
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
}

select{
  background:#111827;
  color:#fff;
  border:none;
  padding:8px 12px;
  border-radius:8px;
}

.card{
  background:#111827;
  padding:30px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.word{
  font-size:30px;
  font-weight:600;
}

.meaning{
  margin-top:12px;
  color:#9ca3af;
}

.example{
  margin-top:8px;
  font-size:14px;
  color:#6b7280;
}

.grammar{
  margin-top:8px;
  font-size:13px;
  color:#f59e0b;
}

.actions{
  margin-top:20px;
  display:flex;
  gap:10px;
}

button{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  font-size:14px;
  cursor:pointer;
}

.primary{background:#2563eb;color:#fff;}
.success{background:#16a34a;color:#fff;}
.danger{background:#dc2626;color:#fff;}

input{
  width:100%;
  margin-top:15px;
  padding:12px;
  border-radius:10px;
  border:none;
  background:#1f2937;
  color:#fff;
}

.progress{
  height:6px;
  background:#1f2937;
  border-radius:10px;
  margin-bottom:15px;
}

.bar{
  height:100%;
  width:0%;
  background:#22c55e;
}
</style>
</head>

<body>
<div class="container">

<div class="header">
<select id="level">
<option>A1</option>
<option>A2</option>
</select>

<select id="mode">
<option value="exam">Thi</option>
<option value="talk">Giao tiếp</option>
</select>
</div>

<div class="progress"><div class="bar" id="bar"></div></div>

<div class="card">
<div class="word" id="word"></div>
<div class="meaning" id="meaning"></div>
<div class="example" id="example"></div>
<div class="grammar" id="grammar"></div>

<div class="actions">
<button class="primary" onclick="speak()">Nghe</button>
<button class="primary" onclick="toggle()">Hiện nghĩa</button>
</div>

<input id="input" placeholder="Nhập từ..." />

<div class="actions">
<button class="success" onclick="answer(true)">Đúng</button>
<button class="danger" onclick="answer(false)">Sai</button>
</div>

</div>

</div>

<script>
const DATA={
A2:{
exam:[
{w:"Was machst du?",m:"Bạn làm gì?",ex:"Was machst du heute?",g:"Hiện tại"}
]
}
};

let level="A2", mode="exam", i=0, correct=0;

function render(){
let c=DATA[level][mode][i];
word.innerText=c.w;
meaning.innerText=c.m;
example.innerText="Ví dụ: "+c.ex;
grammar.innerText="Ngữ pháp: "+c.g;

meaning.style.display="none";
example.style.display="none";
grammar.style.display="none";

bar.style.width=(correct/1)*100+"%";
}

function toggle(){
let v=meaning.style.display==="block";
meaning.style.display=v?"none":"block";
example.style.display=v?"none":"block";
grammar.style.display=v?"none":"block";
}

function speak(){
let u=new SpeechSynthesisUtterance(word.innerText);
u.lang="de-DE";
speechSynthesis.speak(u);
}

function answer(ok){
if(ok) correct++;
i=0;
render();
}

render();
</script>

</body>
</html>
